name: dune-run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # daily at midnight UTC

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build (tsc -> dist/)
        run: npm run build

      - name: Fetch USDO risk
        env:
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
          XRPL_RPC_URL: ${{ vars.XRPL_RPC_URL }}
          MONGODB_CONNECTION_STRING: ${{ secrets.MONGODB_CONNECTION_STRING }}
        run: npm run fetch-usdo-risk

      - name: Fetch PRISM risk
        env:
          HARUKO_BEARER_TOKEN: ${{ secrets.HARUKO_BEARER_TOKEN }}
          MONGODB_CONNECTION_STRING: ${{ secrets.MONGODB_CONNECTION_STRING }}
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
        run: npm run fetch-prism-risk
